# =============================================================================
#  nginx.conf — GraphRAG Research Assistant Frontend
#
#  Responsibilities:
#    1. Serve the React SPA with HTML5 history API support (try_files → index.html)
#    2. Proxy all /api/* requests to the backend FastAPI service
#    3. Enable gzip compression for text assets
#    4. Set cache headers for static assets
# =============================================================================

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── SPA routing ─────────────────────────────────────────────────────────
    # All routes that don't match a real file fall through to index.html,
    # so that React Router can handle client-side navigation.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API proxy ────────────────────────────────────────────────────────────
    # Strip the /api prefix and forward to the backend container.
    # The backend service is reachable at http://backend:8000 on the
    # shared Docker bridge network (graphrag-network).
    location /api/ {
        rewrite ^/api(/.*)$ $1 break;
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        # Allow large PDF uploads to pass through
        client_max_body_size 55m;
        proxy_read_timeout   120s;
        proxy_send_timeout   120s;
    }

    # ── Static asset caching ─────────────────────────────────────────────────
    # Vite fingerprints JS/CSS/image files with content hashes; cache aggressively.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Gzip compression ─────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
